<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LICENA — Course</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css?v=15">
<link rel="stylesheet" href="css/course.css?v=19">
</head>
<body>

<div class="course-top">
  <div class="wrap course-top-inner">
    <button class="back-btn" id="backBtn">
      <svg class="back-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
      <span id="backLabel">My courses</span>
    </button>
    <span class="course-state-pill" id="courseStatePill"></span>
    <div class="course-top-title" id="courseTitle"></div>
    <!-- Study language selector (course content only) -->
    <div class="study-lang-wrap" id="studyLangWrap"></div>
  </div>
</div>

<div class="course-shell wrap" id="courseShell" style="display:none">

  <!-- Sidebar -->
  <aside class="course-side">
    <div class="progress-box">
      <div class="prog-label"><span class="prog-done"><span id="progCount">0</span> / <span id="progTotal">0</span></span></div>
      <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    </div>
    <div class="side-sections" id="sideSections"></div>
    <div class="side-resources" id="sideResources" style="display:none"></div>
    <div class="side-controls">
      <button class="ctrl-btn ctrl-btn-filter" id="filterWrongBtn"></button>
      <button class="ctrl-btn" id="restartBtn">
        <svg class="ctrl-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 2v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L3 8"/></svg>
        <span id="restartLabel">Restart</span>
      </button>
      <button class="ctrl-btn ctrl-btn-danger" id="resetProgressBtn">
        <svg class="ctrl-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M10 11v6M14 11v6"/></svg>
        <span id="resetProgressLabel">Reset progress</span>
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main class="course-main">
    <div class="block-cards" id="blockCards" style="display:none"></div>
    <div class="q-card" id="qCard" style="display:none">
      <div class="q-meta">
        <span class="q-num" id="qNum"></span>
        <span class="q-section" id="qSection"></span>
      </div>
      <div class="q-text" id="qText"></div>
      <div class="q-opts" id="qOpts"></div>
      <div class="q-explanation" id="qExplanation" style="display:none"></div>
      <div class="q-nav">
        <button class="btn btn-ghost" id="prevBtn">← Prev</button>
        <button class="btn btn-primary" id="nextBtn">Next →</button>
      </div>
    </div>

    <div class="results-card" id="resultsCard" style="display:none">
      <div class="result-score" id="resultScore"></div>
      <div class="result-label" id="resultLabel"></div>
      <div class="result-stats" id="resultStats"></div>
      <button class="btn btn-primary" id="retryBtn" style="margin-top:24px">Try again</button>
    </div>

    <div class="coming-soon-card" id="comingSoon" style="display:none">
      <div class="cs-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></div>
      <h2 id="csTitle"></h2>
      <p id="csText"></p>
      <button class="btn btn-ghost" id="csBack">← Back</button>
    </div>

    <article class="guide-view" id="guideView" style="display:none"></article>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js?v=13"></script>
<script src="js/catalog.js?v=13"></script>
<script src="js/catalog/ca.js?v=13"></script>
<script src="js/catalog/az.js?v=13"></script>
<script src="js/i18n-app.js?v=13"></script>
<script src="js/course-blocks.js?v=13"></script>
<!-- Question files are lazy-loaded by app-course.js for the opened course only
     (js/questions/<id>.js). Adding a course never touches this page. -->
<script src="js/honest-chances.js?v=13"></script>
<script src="js/app-course.js?v=13"></script>
</body>
</html>
