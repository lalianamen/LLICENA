name: Claude — work a support ticket

# A support ticket from the in-app chat is turned into a GitHub issue by the
# ticket-issue Edge Function. When you greenlight that issue by adding the
# "from-chat" label, Claude Code works the request on a branch and opens a PR
# for your review. It NEVER merges — you approve by merging (or close to reject).
#
# Setup (one-time):
#   1. Install the Claude GitHub App on this repo: https://github.com/apps/claude
#   2. Repo → Settings → Secrets and variables → Actions → add ANTHROPIC_API_KEY
#
# Cost note: every greenlit ticket is a paid Claude run + Actions minutes, so the
# "from-chat" label is the gate — only issues you greenlight are worked.

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write   # required by claude-code-action (OIDC auth)

jobs:
  work-ticket:
    # Only run once the issue carries the greenlight label.
    if: contains(github.event.issue.labels.*.name, 'from-chat')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --max-turns 50
            --permission-mode acceptEdits
            --allowedTools "Bash,Edit,Write,Read,Grep,Glob,WebFetch,WebSearch"
          prompt: |
            A LICENA support ticket was submitted through the in-app chat and
            promoted to this GitHub issue. Treat it as a work request.

            Issue title: ${{ github.event.issue.title }}
            Issue body:
            ${{ github.event.issue.body }}

            Do this:
            1. Read CLAUDE.md and follow it strictly — especially: verify every
               exam/content fact against the official primary source, never invent
               questions, answers, fees, dates, or URLs, and stay in the correct
               lane (content / design / resources). For Construction banks keep the
               5 blocks x 100 questions shape.
            2. Create a new branch with `git checkout -b claude/ticket-<short-slug>` and
               implement the request there. Never commit to main.
            3. Verify the project's way: run `node --check` on any JS you touch, and
               grep that every id / class / data-* hook the JS relies on still
               exists after any HTML/CSS edit. Render the affected page if the
               runner allows it; otherwise state clearly in the PR what still needs
               a human visual check (desktop + 360px, EN + RU).
            4. Commit, push with `git push -u origin <branch>`, then open a Pull
               Request using `gh pr create` — title + body describing what you changed,
               what you verified, and any facts you could NOT confirm from an official
               source (leave those out and flag them). Reference this issue in the body.
            5. Do NOT merge and do NOT touch main. A human reviews and merges. If
               the request can't be done safely or needs a product decision, open
               the PR as a draft (or comment on the issue) explaining why instead of
               forcing a change.
